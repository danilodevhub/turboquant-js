<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- For dark backgrounds (white/light pages) -->

  <!-- Scattered dots (uncompressed) — top left area -->
  <circle cx="80"  cy="80"  r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="170" cy="50"  r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="115" cy="165" r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="220" cy="120" r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="60"  cy="240" r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="180" cy="255" r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="265" cy="70"  r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="275" cy="215" r="18" fill="#4361ee" opacity="0.3" />
  <circle cx="130" cy="330" r="18" fill="#4361ee" opacity="0.3" />

  <!-- Converging lines -->
  <line x1="80"  y1="80"  x2="320" y2="320" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="170" y1="50"  x2="355" y2="320" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="115" y1="165" x2="330" y2="350" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="220" y1="120" x2="360" y2="340" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="60"  y1="240" x2="315" y2="360" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="180" y1="255" x2="345" y2="360" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="265" y1="70"  x2="370" y2="320" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="275" y1="215" x2="375" y2="345" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />
  <line x1="130" y1="330" x2="325" y2="370" stroke="#4361ee" stroke-width="1.5" opacity="0.15" />

  <!-- Compressed cluster (quantized) — bottom right -->
  <circle cx="320" cy="320" r="20" fill="#4361ee" />
  <circle cx="360" cy="320" r="20" fill="#4361ee" />
  <circle cx="400" cy="320" r="20" fill="#4361ee" />
  <circle cx="320" cy="360" r="20" fill="#4361ee" />
  <circle cx="360" cy="360" r="20" fill="#4cc9f0" />
  <circle cx="400" cy="360" r="20" fill="#4361ee" />
  <circle cx="320" cy="400" r="20" fill="#4361ee" />
  <circle cx="360" cy="400" r="20" fill="#4361ee" />
  <circle cx="400" cy="400" r="20" fill="#4361ee" />
</svg>
